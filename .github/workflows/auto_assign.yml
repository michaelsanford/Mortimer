name: Auto-assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Assign owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "issues" ]; then
            gh issue edit "$NUMBER" --add-assignee michaelsanford
          else
            gh pr edit "$NUMBER" --add-assignee michaelsanford
          fi
