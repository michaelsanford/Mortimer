name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag of the release to deploy (leave blank to deploy latest)'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Separating prepare and deploy into distinct jobs is intentional.
  # actions/deploy-pages fails if it finds more than one artifact named
  # "github-pages" for the same workflow run. This happens when "Re-run failed
  # jobs" is used after the deploy step fails — the re-run re-uploads a second
  # artifact. By isolating the upload here, a re-run of the failing `deploy`
  # job does not re-execute `prepare`, so only one artifact ever exists.
  prepare:
    name: Download & Prepare Pages Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME=$(gh release view --json tagName --template '{{.tagName}}')
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          echo "Deploying version $TAG_NAME"

          gh release download "$TAG_NAME" \
            --pattern "mortimer-$TAG_NAME.zip" \
            --repo "${{ github.repository }}"

          unzip "mortimer-$TAG_NAME.zip" -d extracted

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './extracted/dist'

  deploy:
    name: Deploy to GitHub Pages
    needs: prepare
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
