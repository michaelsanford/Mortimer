<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'none';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Note: X-Frame-Options and CSP frame-ancestors are only honoured as real HTTP
         headers, not via <meta>, so they are omitted here. Configure them at the host
         (or a reverse proxy) if clickjacking protection is required. -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), autoplay=(), encrypted-media=(), picture-in-picture=(), fullscreen=(self)" />
    <meta name="referrer" content="no-referrer" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Calculate Canadian mortgage prepayments, compare refinancing rates, and plan home equity HELOC borrowing with maximum privacy." />
    <title>Mortimer - Canadian Mortgage Insights</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service Worker is registered by the useServiceWorker hook (src/hooks/useServiceWorker.ts).
         It self-guards with import.meta.env.PROD so it only runs in production builds. -->
  </body>
</html>
